{% extends "base.html" %}

{% block title %}500 - 服务器错误{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: 60vh;">
    <div style="text-align: center; max-width: 500px;">
        <div style="font-family: var(--font-display); font-size: 120px; font-weight: 700; color: var(--color-danger); line-height: 1; margin-bottom: var(--space-lg);">
            500
        </div>
        <h1 style="font-size: 32px; font-weight: 600; margin-bottom: var(--space-md); color: var(--color-text);">
            服务器内部错误
        </h1>
        <p style="font-size: 16px; color: var(--color-text-secondary); margin-bottom: var(--space-xl);">
            抱歉，服务器遇到了一些问题，请稍后再试
        </p>
        <div style="display: flex; gap: var(--space-md); justify-content: center;">
            <a href="{{ url_for('index') }}" class="btn btn-primary" style="padding: var(--space-md) var(--space-xl); font-size: 16px;">
                <i class="fas fa-home"></i>
                返回首页
            </a>
            <button onclick="window.location.reload()" class="btn" style="padding: var(--space-md) var(--space-xl); font-size: 16px;">
                <i class="fas fa-redo"></i>
                重新加载
            </button>
        </div>
    </div>
</div>
{% endblock %}
