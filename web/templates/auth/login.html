<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - CPA 账号管理系统</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #FAFAF8;
            --bg-card: #FFFFFF;
            --border-primary: #E5E5E0;
            --border-hover: #0A5F5F;
            
            --color-primary: #0A5F5F;
            --color-primary-light: #0D7A7A;
            --color-text: #1A1A1A;
            --color-text-secondary: #6B6B66;
            --color-text-tertiary: #9B9B96;
            
            --color-danger: #DC2626;
            
            --font-display: 'Archivo', -apple-system, sans-serif;
            --font-body: 'IBM Plex Sans', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Courier New', monospace;
            
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-lg);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: var(--space-xl);
        }
        
        .login-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto var(--space-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--color-primary);
            border-radius: 12px;
            color: var(--color-primary);
            font-size: 24px;
        }
        
        .login-title {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: var(--space-sm);
        }
        
        .login-subtitle {
            font-size: 15px;
            color: var(--color-text-secondary);
        }
        
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: 16px;
            padding: var(--space-xl);
            box-shadow: 0 8px 24px rgba(10, 95, 95, 0.08);
        }
        
        .alert {
            padding: var(--space-md);
            margin-bottom: var(--space-lg);
            border: 1px solid var(--color-danger);
            border-radius: 8px;
            background: rgba(220, 38, 38, 0.05);
            color: var(--color-danger);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }
        
        .form-group {
            margin-bottom: var(--space-lg);
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: var(--space-sm);
            color: var(--color-text);
        }
        
        .form-control {
            width: 100%;
            padding: 12px var(--space-md);
            font-family: var(--font-body);
            font-size: 15px;
            border: 1px solid var(--border-primary);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--color-text);
            transition: all var(--transition-fast);
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--border-hover);
            box-shadow: 0 0 0 3px rgba(10, 95, 95, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 12px var(--space-md);
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: 500;
            border: 1px solid var(--color-primary);
            border-radius: 8px;
            background: var(--color-primary);
            color: white;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
        }
        
        .btn-login:hover {
            background: var(--color-primary-light);
            border-color: var(--color-primary-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(10, 95, 95, 0.25);
        }
        
        .login-footer {
            margin-top: var(--space-lg);
            padding-top: var(--space-lg);
            border-top: 1px solid var(--border-primary);
            text-align: center;
            font-size: 13px;
            color: var(--color-text-tertiary);
        }
        
        .login-footer code {
            font-family: var(--font-mono);
            font-size: 12px;
            padding: 2px 6px;
            background: var(--bg-primary);
            border: 1px solid var(--border-primary);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon">
                <i class="fas fa-server"></i>
            </div>
            <h1 class="login-title">CPA 账号管理系统</h1>
            <p class="login-subtitle">登录以继续</p>
        </div>
        
        <div class="login-card">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert">
                        <i class="fas fa-exclamation-circle"></i>
                        <span>{{ message }}</span>
                    </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" name="username" required autofocus>
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>登录</span>
                </button>
            </form>
            
            <div class="login-footer">
                默认账号：<code>admin</code> / <code>admin123</code>
            </div>
        </div>
    </div>
</body>
</html>
