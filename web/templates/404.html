{% extends "base.html" %}

{% block title %}404 - 页面未找到{% endblock %}

{% block content %}
<div class="container text-center" style="padding-top: 100px;">
    <i class="fas fa-exclamation-triangle" style="font-size: 5rem; color: #ffc107;"></i>
    <h1 class="mt-4">404</h1>
    <h3>页面未找到</h3>
    <p class="text-muted">抱歉，您访问的页面不存在</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary mt-3">
        <i class="fas fa-home"></i> 返回首页
    </a>
</div>
{% endblock %}
