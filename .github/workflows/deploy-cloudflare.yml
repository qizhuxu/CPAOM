name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'cf/**'
      - '.github/workflows/deploy-cloudflare.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'cf/**'
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare
    defaults:
      run:
        working-directory: cf
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cf/package.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          echo "Running D1 migrations..."
          npx wrangler d1 migrations apply cpa-manager-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: cf
          secrets: |
            ADMIN_USERNAME
            ADMIN_PASSWORD
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Cloudflare Workers deployment successful!"
          echo "🌐 Your worker is now live"
          echo "📊 Check the Cloudflare dashboard for details"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Please check the logs above for details"
