name: Deploy Cloudflare Preview

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'cf/**'

jobs:
  preview:
    runs-on: ubuntu-latest
    name: Deploy Preview Environment
    defaults:
      run:
        working-directory: cf
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cf/package.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env preview
          workingDirectory: cf
          secrets: |
            ADMIN_USERNAME
            ADMIN_PASSWORD
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://cpa-manager-preview.your-subdomain.workers.dev`;
            
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Cloudflare Preview deployment successful!\n\n📍 Preview URL: ${previewUrl}\n\n⚠️ This is a preview environment. Changes will not affect production.`
            });
