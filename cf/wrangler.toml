name = "cpa-manager"
main = "src/index.js"
compatibility_date = "2024-01-01"
node_compat = true

# KV 命名空间 - 用于存储账号数据
[[kv_namespaces]]
binding = "ACCOUNTS"
id = "your-kv-namespace-id"  # 运行 npm run kv:create 后替换

# D1 数据库 - 用于存储操作日志和统计
[[d1_databases]]
binding = "DB"
database_name = "cpa-manager-db"
database_id = "your-database-id"  # 运行 npm run d1:create 后替换

# 环境变量
[vars]
ENVIRONMENT = "production"

# 生产环境配置
[env.production]
name = "cpa-manager"
vars = { ENVIRONMENT = "production" }

# 开发环境配置
[env.dev]
name = "cpa-manager-dev"
vars = { ENVIRONMENT = "development" }

# 路由配置（可选）
# routes = [
#   { pattern = "cpa.yourdomain.com", zone_name = "yourdomain.com" }
# ]
